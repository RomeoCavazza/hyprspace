name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Hyprland Cachix
        uses: cachix/cachix-action@v14
        with:
          name: hyprland

      - name: Build
        run: nix build -L

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp result/lib/libHyprspace.so libHyprspace.so
          if ! gh release create "${{ github.ref_name }}" \
            --title "Alpha release" \
            --notes "Alpha release for Hyprland v0.55.4" \
            libHyprspace.so; then
            echo "Release already exists. Updating existing release..."
            gh release upload --clobber "${{ github.ref_name }}" libHyprspace.so
            gh release edit "${{ github.ref_name }}" \
              --title "Alpha release"
          fi
