name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Hyprland Cachix
        uses: cachix/cachix-action@v14
        with:
          name: hyprland

      - name: Check flake
        run: nix flake check -L

      - name: Build plugin
        run: nix build -L
